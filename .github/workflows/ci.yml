name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          # Install the package itself plus the [test] extra. The [test] extra
          # pulls pytest + pytest-django. Runtime extras include scitex-dev /
          # scitex-ui which may be unpublished pre-release: tolerate failure of
          # those alone while still installing the rest.
          pip install -e ".[test]" || {
            echo "::warning::Editable install with extras failed; retrying without unpublished extras"
            pip install pytest pytest-django click pyyaml requests
            pip install -e . --no-deps
          }

      - name: Show installed package
        run: pip show scitex-agentic-journal | head -20

      - name: Run pytest
        run: pytest -ra
